apps:
  - id: aimloul-blog
    image: ghcr.io/imloul-com/aimloul-blog-static
    route: /
    env:
      prod:
        version: prod-latest
        pages: portfolio
      dev:
        version: dev-latest
        pages: portfolio-dev

  - id: ast-viz
    image: ghcr.io/imloul-com/ast-viz-static
    route: /tools/ast-viz
    env:
      prod:
        version: prod-latest
        pages: ast-viz
      dev:
        version: dev-latest
        pages: ast-viz-dev