apps:
  - id: aimloul-blog
    image: ghcr.io/imloul-com/aimloul-blog-static
    route: /
    env:
      prod:
        version: prod-latest
        pages: portfolio
      dev:
        version: sha-b54f4c2a6728
        pages: portfolio-dev

  - id: ast-viz
    image: ghcr.io/imloul-com/ast-viz-static
    route: /tools/ast-viz
    env:
      prod:
        version: prod-latest
        pages: ast-viz
      dev:
        version: dev-latest
        pages: ast-viz-dev
        
  - id: bloom-filter
    image: ghcr.io/imloul-com/bloom-filter-static
    route: /tools/bloom-filter
    env:
      prod:
        version: prod-latest
        pages: bloom-filter
      dev:
        version: sha-1e94fd4fcc3d
        pages: bloom-filter-dev