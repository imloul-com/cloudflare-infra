apps:
  - id: aimloul-blog
    image: ghcr.io/imloul-com/aimloul-blog-static
    env:
      prod:
        route: /
        version: prod-latest
        pages: portfolio
      dev:
        route: 
          match: /home
          rewrite: /home
        version: dev-latest
        pages: portfolio-dev

  - id: ast-viz
    image: ghcr.io/imloul-com/ast-viz-static
    env:
      prod:
        route: /tools/ast-viz
        version: prod-latest
        pages: ast-viz
      dev:
        route: /home/tools/ast-viz
        version: dev-latest
        pages: ast-viz-dev
