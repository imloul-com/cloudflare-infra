name: Deploy Apps and Router

on:
  workflow_run:
    workflows: ["Build Router Worker Artifact"]
    types: [completed]
    branches: [main, dev]
  repository_dispatch:
    types: [app-published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: [prod, dev]
      version_override:
        description: "Override version/tag for all apps (optional)"
        required: false
        default: ""
        type: string
  push:
    branches: [main, dev]
    paths:
      - "worker/src/apps.yaml"
      - "worker/wrangler.deploy.toml"
      - ".github/workflows/deploy-apps-and-router.yml"

concurrency:
  group: deploy-apps-and-router-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      environment: ${{ steps.env.outputs.name }}
      worker_name: ${{ steps.env.outputs.worker_name }}
      zone_name: ${{ steps.env.outputs.zone_name }}
      version_override: ${{ steps.env.outputs.version_override }}
      target_app_id: ${{ steps.env.outputs.target_app_id }}
      deploy_apps: ${{ steps.env.outputs.deploy_apps }}
      deploy_router: ${{ steps.env.outputs.deploy_router }}
      router_artifact_tag: ${{ steps.env.outputs.router_artifact_tag }}
      matrix: ${{ steps.catalog.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Validate app catalog
        working-directory: worker
        run: make validate-catalog

      - name: Determine deployment environment
        id: env
        run: |
          target_app_id=""
          deploy_apps="false"
          deploy_router="false"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            branch="${{ github.event.workflow_run.head_branch }}"
            env_name="$( [ "$branch" = "dev" ] && echo "dev" || echo "prod" )"
            version_override=""
            deploy_router="true"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            env_name="${{ inputs.environment }}"
            version_override="${{ inputs.version_override }}"
            deploy_apps="true"
            deploy_router="true"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            env_name="${{ github.event.client_payload.environment }}"
            version_override="${{ github.event.client_payload.version_override }}"
            published_app="${{ github.event.client_payload.app }}"
            target_app_id="${published_app##*/}"
            deploy_apps="true"
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            env_name="dev"
            version_override=""
          else
            env_name="prod"
            version_override=""
          fi

          if [ -z "$env_name" ]; then
            env_name="prod"
          fi

          if [ "$env_name" = "dev" ]; then
            echo "name=dev" >> "$GITHUB_OUTPUT"
            echo "worker_name=domain-router-dev" >> "$GITHUB_OUTPUT"
            echo "zone_name=dev.imloul.com" >> "$GITHUB_OUTPUT"
            default_router_tag="dev-latest"
          else
            echo "name=prod" >> "$GITHUB_OUTPUT"
            echo "worker_name=domain-router" >> "$GITHUB_OUTPUT"
            echo "zone_name=${{ vars.CLOUDFLARE_ZONE_NAME }}" >> "$GITHUB_OUTPUT"
            default_router_tag="prod-latest"
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            before_sha="${{ github.event.before }}"
            if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
              changed_files="$(git diff --name-only "$before_sha" "${{ github.sha }}")"
            elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              changed_files="$(git diff --name-only HEAD^ "${{ github.sha }}" || true)"
            else
              changed_files="$(git show --pretty='' --name-only "${{ github.sha }}" || true)"
            fi

            if printf '%s\n' "$changed_files" | grep -Eq '^worker/src/apps\.yaml$'; then
              deploy_apps="true"
            fi

            if printf '%s\n' "$changed_files" | grep -Eq '^(worker/src/apps\.yaml|worker/wrangler\.deploy\.toml|\.github/workflows/deploy-apps-and-router\.yml)$'; then
              deploy_router="true"
            fi
          fi

          router_artifact_tag="$default_router_tag"
          if [ -n "$version_override" ]; then
            router_artifact_tag="$version_override"
          fi

          echo "version_override=$version_override" >> "$GITHUB_OUTPUT"
          echo "target_app_id=$target_app_id" >> "$GITHUB_OUTPUT"
          echo "deploy_apps=$deploy_apps" >> "$GITHUB_OUTPUT"
          echo "deploy_router=$deploy_router" >> "$GITHUB_OUTPUT"
          echo "router_artifact_tag=$router_artifact_tag" >> "$GITHUB_OUTPUT"

      - name: Build app deployment matrix from catalog
        id: catalog
        run: |
          # Guardrail: ensure Terraform defaults still include known Pages base names.
          while IFS= read -r name; do
            if ! grep -q "\"${name}\"" terraform/variables.tf; then
              echo "Terraform variables drift: missing project name '${name}'" >&2
              exit 1
            fi
          done < <(yq -o json '.' worker/src/apps.yaml | jq -r '.apps[].env.prod.pages')

          if [ "${{ steps.env.outputs.deploy_apps }}" != "true" ]; then
            matrix='[]'
          elif [ -n "${{ steps.env.outputs.target_app_id }}" ]; then
            matrix=$(yq -o json '.' worker/src/apps.yaml | jq -c --arg target "${{ steps.env.outputs.target_app_id }}" '.apps | map(select(.id == $target) | {appId: .id, projectName: .env.prod.pages, devProjectName: .env.dev.pages, image, prodVersion: .env.prod.version, devVersion: .env.dev.version})')
            if [ "$matrix" = "[]" ]; then
              echo "app '${{ steps.env.outputs.target_app_id }}' not found in worker/src/apps.yaml" >&2
              exit 1
            fi
          else
            matrix=$(yq -o json '.' worker/src/apps.yaml | jq -c '.apps | map({appId: .id, projectName: .env.prod.pages, devProjectName: .env.dev.pages, image, prodVersion: .env.prod.version, devVersion: .env.dev.version})')
            if [ -z "$matrix" ] || [ "$matrix" = "[]" ]; then
              echo "app catalog is empty" >&2
              exit 1
            fi
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  deploy_apps:
    name: Deploy app ${{ matrix.appId }}
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.deploy_apps == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      TARGET_ENV: ${{ needs.prepare.outputs.environment }}
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version_override }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Pages project
        id: pages
        run: |
          if [ "${TARGET_ENV}" = "dev" ]; then
            echo "name=${{ matrix.devProjectName }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ matrix.projectName }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine artifact version
        id: version
        run: |
          if [ -n "${VERSION_OVERRIDE}" ]; then
            version="${VERSION_OVERRIDE}"
          elif [ "${TARGET_ENV}" = "dev" ]; then
            version="${{ matrix.devVersion }}"
          else
            version="${{ matrix.prodVersion }}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -euo pipefail
          username="${GHCR_USERNAME:-${{ github.repository_owner }}}"
          echo "${{ secrets.CROSS_REPO_TOKEN }}" | oras login ghcr.io -u "${username}" --password-stdin

      - name: Pull app artifact from GHCR
        run: |
          set -euo pipefail
          mkdir -p .artifact
          cd .artifact
          artifact_ref="${{ matrix.image }}:${{ steps.version.outputs.value }}"
          echo "Pulling ${artifact_ref}"
          oras pull "${artifact_ref}"
          artifact_file="$(find . -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${artifact_file}" ]; then
            echo "No .tar.gz artifact found in ${artifact_ref}" >&2
            exit 1
          fi
          echo "Using artifact archive: ${artifact_file}"
          mkdir -p app_build
          tar -xzf "${artifact_file}" -C app_build

      - name: Check if Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ steps.pages.outputs.name }}
        run: |
          status_code=$(curl -sS -o /tmp/cf-pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PROJECT_NAME}")
          if [ "$status_code" != "200" ]; then
            echo "Missing Terraform-managed Pages project: ${CLOUDFLARE_PROJECT_NAME}" >&2
            cat /tmp/cf-pages-project.json
            exit 1
          fi

      - name: Deploy app to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages deploy .artifact/app_build --project-name ${{ steps.pages.outputs.name }} --branch main --commit-dirty=true

  deploy_router:
    name: Deploy router worker
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.deploy_router == 'true'
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -euo pipefail
          username="${GHCR_USERNAME:-${{ github.repository_owner }}}"
          echo "${{ secrets.CROSS_REPO_TOKEN }}" | oras login ghcr.io -u "${username}" --password-stdin

      - name: Pull prebuilt router worker from GHCR
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/domain-router-worker"
          artifact_ref="${image}:${{ needs.prepare.outputs.router_artifact_tag }}"
          mkdir -p .artifact
          cd .artifact
          echo "Pulling ${artifact_ref}"
          oras pull "${artifact_ref}"
          artifact_file="$(find . -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${artifact_file}" ]; then
            echo "No worker artifact archive found in ${artifact_ref}" >&2
            exit 1
          fi
          echo "Using worker artifact archive: ${artifact_file}"
          tar -xzf "${artifact_file}" -C ..

      - name: Assemble route definitions from catalog
        run: |
          make assemble-routes ENVIRONMENT="${{ needs.prepare.outputs.environment }}"
          jq . src/route-definitions.json

      - name: Resolve Pages origins
        id: origins
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          deploy_var_args="$(make resolve-origins ROUTE_DEFINITIONS_PATH=src/route-definitions.json)"
          {
            echo "deploy_var_args<<EOF"
            echo "$deploy_var_args"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Inject route definitions into deploy config
        run: |
          cp wrangler.deploy.toml wrangler.deploy.generated.toml
          route_defs=$(jq -c '.' src/route-definitions.json)
          printf "\n[vars]\nROUTE_DEFINITIONS = '%s'\n" "$route_defs" >> wrangler.deploy.generated.toml

      - name: Deploy router worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "4.80.0"
          command: deploy --config wrangler.deploy.generated.toml --name ${{ needs.prepare.outputs.worker_name }}${{ steps.origins.outputs.deploy_var_args }}

      - name: Post-deploy smoke test
        env:
          CLOUDFLARE_ZONE_NAME: ${{ needs.prepare.outputs.zone_name }}
        run: |
          sleep 3
          cargo run --quiet --bin uptime_monitor -- --app-sources-path src/apps.yaml
