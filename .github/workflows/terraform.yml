name: Terraform Cloudflare Infra

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_zone_name: ${{ vars.CLOUDFLARE_ZONE_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_R2_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required vars
        run: |
          if [ -z "$TF_VAR_account_id" ]; then
            echo "Missing repository secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$TF_VAR_zone_name" ]; then
            echo "Missing repository variable: CLOUDFLARE_ZONE_NAME"
            exit 1
          fi
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "Missing repository secret: TF_STATE_R2_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Missing repository secret: TF_STATE_R2_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "Missing repository secret: TF_STATE_R2_BUCKET"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: >
          terraform init -input=false -reconfigure
          -backend-config="bucket=${TF_STATE_BUCKET}"
          -backend-config="key=cloudflare-infra/terraform.tfstate"
          -backend-config="region=us-east-1"
          -backend-config="endpoint=https://${TF_VAR_account_id}.r2.cloudflarestorage.com"
          -backend-config="skip_credentials_validation=true"
          -backend-config="skip_region_validation=true"
          -backend-config="skip_metadata_api_check=true"
          -backend-config="skip_requesting_account_id=true"
          -backend-config="force_path_style=true"

      - name: Terraform Fmt
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=tfplan

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
    environment:
      name: production
    defaults:
      run:
        working-directory: terraform
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_zone_name: ${{ vars.CLOUDFLARE_ZONE_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_R2_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: >
          terraform init -input=false -reconfigure
          -backend-config="bucket=${TF_STATE_BUCKET}"
          -backend-config="key=cloudflare-infra/terraform.tfstate"
          -backend-config="region=us-east-1"
          -backend-config="endpoint=https://${TF_VAR_account_id}.r2.cloudflarestorage.com"
          -backend-config="skip_credentials_validation=true"
          -backend-config="skip_region_validation=true"
          -backend-config="skip_metadata_api_check=true"
          -backend-config="skip_requesting_account_id=true"
          -backend-config="force_path_style=true"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
