name: Terraform Cloudflare Infra

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      force_apply:
        description: "Force terraform apply (manual runs only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_zone_name: ${{ vars.CLOUDFLARE_ZONE_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_R2_BUCKET }}
    outputs:
      has_changes: ${{ steps.has_changes.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required vars
        run: |
          missing=()
          [ -z "$TF_VAR_account_id" ]    && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "$TF_VAR_zone_name" ]     && missing+=("CLOUDFLARE_ZONE_NAME")
          [ -z "$AWS_ACCESS_KEY_ID" ]    && missing+=("TF_STATE_R2_ACCESS_KEY_ID")
          [ -z "$AWS_SECRET_ACCESS_KEY" ] && missing+=("TF_STATE_R2_SECRET_ACCESS_KEY")
          [ -z "$TF_STATE_BUCKET" ]      && missing+=("TF_STATE_R2_BUCKET")
          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing: %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "terraform init attempt ${attempt}/3"
            if terraform init -input=false -reconfigure \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=cloudflare-infra/terraform.tfstate" \
              -backend-config="region=us-east-1" \
              -backend-config="endpoint=https://${TF_VAR_account_id}.r2.cloudflarestorage.com" \
              -backend-config="skip_credentials_validation=true" \
              -backend-config="skip_region_validation=true" \
              -backend-config="skip_metadata_api_check=true" \
              -backend-config="skip_requesting_account_id=true" \
              -backend-config="force_path_style=true"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done
          echo "terraform init failed after 3 attempts"
          exit 1

      - name: Check provider lock file
        run: |
          if ! git diff --exit-code .terraform.lock.hcl >/dev/null 2>&1; then
            echo "::warning::.terraform.lock.hcl is out of date. Run 'terraform init' locally and commit the updated lock file."
          fi
          if [ ! -f .terraform.lock.hcl ] || ! git ls-files --error-unmatch .terraform.lock.hcl >/dev/null 2>&1; then
            echo "::warning::.terraform.lock.hcl is not tracked in git. Run 'terraform providers lock -platform=linux_amd64 -platform=darwin_amd64 -platform=darwin_arm64' and commit the result."
          fi

      - name: Terraform Fmt
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: tf_plan
        run: |
          set -o pipefail
          EXIT_CODE=0
          terraform plan -input=false -no-color -out=tfplan -detailed-exitcode 2>&1 | tee plan_output.txt || EXIT_CODE=$?

          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 2 ]; then
            echo "terraform plan failed with exit code $EXIT_CODE" >&2
            exit "$EXIT_CODE"
          fi

      - name: Detect whether plan has changes
        id: has_changes
        run: |
          change_count=$(terraform show -json tfplan | jq '.resource_changes | length')
          if [ "$change_count" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected resource_changes count: $change_count"

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... (truncated)'
              : plan;

            const body = `### Terraform Plan
            
            \`\`\`
            ${truncated}
            \`\`\`
            
            *Pushed by @${context.actor} · Plan will auto-apply on merge to main.*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.startsWith('### Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload plan artifact
        if: (github.event_name == 'push' && steps.has_changes.outputs.has_changes == 'true') || (github.event_name == 'workflow_dispatch' && inputs.force_apply)
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/tfplan
          if-no-files-found: error
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && (needs.plan.outputs.has_changes == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_apply))
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    environment:
      name: production
    defaults:
      run:
        working-directory: terraform
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_zone_name: ${{ vars.CLOUDFLARE_ZONE_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_R2_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "terraform init attempt ${attempt}/3"
            if terraform init -input=false -reconfigure \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=cloudflare-infra/terraform.tfstate" \
              -backend-config="region=us-east-1" \
              -backend-config="endpoint=https://${TF_VAR_account_id}.r2.cloudflarestorage.com" \
              -backend-config="skip_credentials_validation=true" \
              -backend-config="skip_region_validation=true" \
              -backend-config="skip_metadata_api_check=true" \
              -backend-config="skip_requesting_account_id=true" \
              -backend-config="force_path_style=true"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done
          echo "terraform init failed after 3 attempts"
          exit 1

      - name: Terraform Apply
        run: terraform apply -input=false tfplan
