name: Deploy Router Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

env:
  ROUTE_DEFINITIONS_PATH: src/route-definitions.json

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - name: Resolve Pages origins
        id: origins
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROUTE_DEFINITIONS_PATH: ${{ env.ROUTE_DEFINITIONS_PATH }}
        run: |
          set -euo pipefail

          if [ ! -f "$ROUTE_DEFINITIONS_PATH" ]; then
            echo "Route definitions file not found: $ROUTE_DEFINITIONS_PATH" >&2
            exit 1
          fi

          resolve_origin() {
            local project_name="$1"
            local subdomain
            subdomain=$(curl -sS \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${project_name}" \
              | jq -r '.result.subdomain')
            if [ -z "$subdomain" ] || [ "$subdomain" = "null" ]; then
              echo "Failed to resolve subdomain for Pages project: ${project_name}" >&2
              exit 1
            fi
            echo "https://${subdomain}"
          }

          deploy_var_args=""
          while IFS= read -r route; do
            project_name=$(echo "$route" | jq -r '.projectName')
            origin_var=$(echo "$route" | jq -r '.originVar')
            origin_url=$(resolve_origin "$project_name")
            deploy_var_args="${deploy_var_args} --var ${origin_var}:${origin_url}"
          done < <(jq -c '.[]' "$ROUTE_DEFINITIONS_PATH")

          {
            echo "deploy_var_args<<EOF"
            echo "$deploy_var_args"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "4.14.0"
          command: deploy${{ steps.origins.outputs.deploy_var_args }}
