name: Deploy Router Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
  repository_dispatch:
    types: [app-deployed]
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

env:
  ROUTE_DEFINITIONS_PATH: src/route-definitions.json

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - run: make test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Cache worker-build binary
        id: cache-worker-build
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/worker-build
          key: worker-build-0.1-${{ runner.os }}-${{ hashFiles('worker/Cargo.lock') }}
          restore-keys: |
            worker-build-0.1-${{ runner.os }}-

      - name: Install worker-build
        if: steps.cache-worker-build.outputs.cache-hit != 'true'
        run: cargo install 'worker-build@^0.1'

      - name: Cache worker-build downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/worker-build
          key: worker-build-downloads-${{ runner.os }}-${{ hashFiles('worker/Cargo.lock', 'worker/wrangler.toml') }}
          restore-keys: |
            worker-build-downloads-${{ runner.os }}-

      - name: Cache wrangler npm install
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-wrangler-4.14.0-${{ runner.os }}-${{ hashFiles('worker/wrangler.toml') }}
          restore-keys: |
            npm-wrangler-4.14.0-${{ runner.os }}-

      - name: Assemble route definitions from app repos
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          route_defs="[]"
          while IFS= read -r entry; do
            repo=$(echo "$entry" | jq -r '.repo')

            project_name=$(gh api "repos/${repo}/contents/wrangler.toml?ref=main" \
              --jq '.content' | base64 -d \
              | awk -F'"' '/^name[[:space:]]*=/ { print $2; exit }')

            if [ -z "$project_name" ]; then
              echo "Failed to read project name from ${repo}/wrangler.toml" >&2
              exit 1
            fi

            route_def=$(echo "$entry" | jq --arg pn "$project_name" '. + {projectName: $pn} | del(.repo)')
            route_defs=$(echo "$route_defs" | jq --argjson r "$route_def" '. + [$r]')
          done < <(jq -c '.[]' src/app-sources.json)

          echo "$route_defs" | jq '.' > src/route-definitions.json
          echo "Assembled route definitions:"
          cat src/route-definitions.json

      - name: Inject route definitions into wrangler.toml
        run: |
          route_defs=$(jq -c '.' src/route-definitions.json)
          printf "\n[vars]\nROUTE_DEFINITIONS = '%s'\n" "$route_defs" >> wrangler.toml
          echo "Injected ROUTE_DEFINITIONS into wrangler.toml"

      - name: Resolve Pages origins
        id: origins
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROUTE_DEFINITIONS_PATH: ${{ env.ROUTE_DEFINITIONS_PATH }}
        run: |
          set -euo pipefail

          if [ ! -f "$ROUTE_DEFINITIONS_PATH" ]; then
            echo "Route definitions file not found: $ROUTE_DEFINITIONS_PATH" >&2
            exit 1
          fi

          deploy_var_args="$(make resolve-origins ROUTE_DEFINITIONS_PATH="$ROUTE_DEFINITIONS_PATH")"

          {
            echo "deploy_var_args<<EOF"
            echo "$deploy_var_args"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "4.14.0"
          command: deploy${{ steps.origins.outputs.deploy_var_args }}
