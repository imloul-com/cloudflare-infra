name: Deploy Router Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
  repository_dispatch:
    types: [app-deployed]
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

env:
  ROUTE_DEFINITIONS_PATH: src/route-definitions.json

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - run: make test

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked --quiet

      - name: Audit dependencies
        run: cargo audit

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Cache worker-build binary
        id: cache-worker-build
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/worker-build
          key: worker-build-0.1-${{ runner.os }}-${{ hashFiles('worker/Cargo.lock') }}
          restore-keys: |
            worker-build-0.1-${{ runner.os }}-

      - name: Install worker-build
        if: steps.cache-worker-build.outputs.cache-hit != 'true'
        run: cargo install --force --locked 'worker-build@^0.1'

      - name: Cache worker-build downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/worker-build
          key: worker-build-downloads-${{ runner.os }}-${{ hashFiles('worker/Cargo.lock', 'worker/wrangler.toml') }}
          restore-keys: |
            worker-build-downloads-${{ runner.os }}-

      - name: Cache wrangler npm install
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-wrangler-4.80.0-${{ runner.os }}-${{ hashFiles('worker/wrangler.toml') }}
          restore-keys: |
            npm-wrangler-4.80.0-${{ runner.os }}-

      - name: Assemble route definitions from app repos
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          make assemble-routes
          echo "Assembled route definitions:"
          cat src/route-definitions.json

      - name: Inject route definitions into wrangler.toml
        run: |
          route_defs=$(jq -c '.' src/route-definitions.json)
          printf "\n[vars]\nROUTE_DEFINITIONS = '%s'\n" "$route_defs" >> wrangler.toml
          echo "Injected ROUTE_DEFINITIONS into wrangler.toml"

      - name: Resolve Pages origins
        id: origins
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROUTE_DEFINITIONS_PATH: ${{ env.ROUTE_DEFINITIONS_PATH }}
        run: |
          set -euo pipefail

          if [ ! -f "$ROUTE_DEFINITIONS_PATH" ]; then
            echo "Route definitions file not found: $ROUTE_DEFINITIONS_PATH" >&2
            exit 1
          fi

          deploy_var_args="$(make resolve-origins ROUTE_DEFINITIONS_PATH="$ROUTE_DEFINITIONS_PATH")"

          {
            echo "deploy_var_args<<EOF"
            echo "$deploy_var_args"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "4.80.0"
          command: deploy${{ steps.origins.outputs.deploy_var_args }}

      - name: Post-deploy smoke test
        env:
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME }}
        run: |
          sleep 10
          cargo run --quiet --bin uptime_monitor -- \
            --app-sources-path src/app-sources.json
