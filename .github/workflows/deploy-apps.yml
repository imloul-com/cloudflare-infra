name: Deploy Apps

on:
  repository_dispatch:
    types: [app-published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: [prod, dev]
      version_override:
        description: "Override version/tag for all apps (optional)"
        required: false
        default: ""
        type: string
      target_app_id:
        description: "Deploy only this app id (optional)"
        required: false
        default: ""
        type: string
  push:
    branches: [main]
    paths:
      - "worker/apps.yaml"
      - ".github/workflows/deploy-apps.yml"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_override: ${{ steps.env.outputs.version_override }}
      matrix: ${{ steps.catalog.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Validate app catalog
        working-directory: worker
        run: cargo run --quiet --bin validate_catalog -- --app-sources-path apps.yaml

      - name: Resolve deploy inputs
        id: env
        run: |
          version_override=""
          target_app_id=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version_override="${{ inputs.version_override }}"
            target_app_id="${{ inputs.target_app_id }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            version_override="${{ github.event.client_payload.version_override }}"
            published_app="${{ github.event.client_payload.app }}"
            target_app_id="${published_app##*/}"
          fi

          echo "version_override=$version_override" >> "$GITHUB_OUTPUT"
          echo "target_app_id=$target_app_id" >> "$GITHUB_OUTPUT"

      - name: Resolve target environments
        id: envs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            envs='["${{ inputs.environment }}"]'
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            envs='["${{ github.event.client_payload.environment }}"]'
          else
            envs='["prod","dev"]'
          fi
          echo "json=$envs" >> "$GITHUB_OUTPUT"

      - name: Build app deployment matrix from catalog
        id: catalog
        run: |
          while IFS= read -r name; do
            if ! grep -q "\"${name}\"" terraform/variables.tf; then
              echo "Terraform variables drift: missing project name '${name}'" >&2
              exit 1
            fi
          done < <(yq -o json '.' worker/apps.yaml | jq -r '.apps[].env.prod.pages')

          target_app_id="${{ steps.env.outputs.target_app_id }}"
          envs='${{ steps.envs.outputs.json }}'

          matrix=$(yq -o json '.' worker/apps.yaml | jq -c \
            --arg target "$target_app_id" \
            --argjson envs "$envs" '
            .apps
            | if $target != "" then map(select(.id == $target)) else . end
            | if length == 0 then error("app not found: \($target)") else . end
            | [
                .[] as $app |
                $envs[] as $env |
                {
                  appId: $app.id,
                  environment: $env,
                  pagesProject: (if $env == "dev" then $app.env.dev.pages else $app.env.prod.pages end),
                  image: $app.image,
                  version: (if $env == "dev" then $app.env.dev.version else $app.env.prod.version end)
                }
              ]
          ')

          if [ -z "$matrix" ] || [ "$matrix" = "[]" ]; then
            echo "deployment matrix is empty" >&2
            exit 1
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  deploy_apps:
    name: Deploy ${{ matrix.appId }} (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: prepare
    concurrency:
      group: deploy-apps-${{ matrix.appId }}-${{ matrix.environment }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine artifact version
        id: version
        run: |
          version_override="${{ needs.prepare.outputs.version_override }}"
          echo "value=${version_override:-${{ matrix.version }}}" >> "$GITHUB_OUTPUT"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -euo pipefail
          username="${GHCR_USERNAME:-${{ github.repository_owner }}}"
          echo "${{ secrets.CROSS_REPO_TOKEN }}" | oras login ghcr.io -u "${username}" --password-stdin

      - name: Pull app artifact from GHCR
        run: |
          set -euo pipefail
          mkdir -p .artifact
          cd .artifact
          artifact_ref="${{ matrix.image }}:${{ steps.version.outputs.value }}"
          echo "Pulling ${artifact_ref}"
          oras pull "${artifact_ref}"
          artifact_file="$(find . -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${artifact_file}" ]; then
            echo "No .tar.gz artifact found in ${artifact_ref}" >&2
            exit 1
          fi
          echo "Using artifact archive: ${artifact_file}"
          mkdir -p app_build
          tar -xzf "${artifact_file}" -C app_build

      - name: Check if Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ matrix.pagesProject }}
        run: |
          status_code=$(curl -sS -o /tmp/cf-pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PROJECT_NAME}")
          if [ "$status_code" != "200" ]; then
            echo "Missing Terraform-managed Pages project: ${CLOUDFLARE_PROJECT_NAME}" >&2
            cat /tmp/cf-pages-project.json
            exit 1
          fi

      - name: Deploy app to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages deploy .artifact/app_build --project-name ${{ matrix.pagesProject }} --branch main --commit-dirty=true
