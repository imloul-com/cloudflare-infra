name: Deploy Apps

on:
  repository_dispatch:
    types: [app-published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: [prod, dev]
      version_override:
        description: "Override version/tag for all apps (optional)"
        required: false
        default: ""
        type: string
      target_app_id:
        description: "Deploy only this app id (optional)"
        required: false
        default: ""
        type: string
  push:
    branches: [main]
    paths:
      - "worker/apps.yaml"
      - ".github/workflows/deploy-apps.yml"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_override: ${{ steps.inputs.outputs.version_override }}
      matrix: ${{ steps.matrix.outputs.value }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the previous commit so `git show ${before}:worker/apps.yaml`
          # works for the diff_versions path on push events.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Validate app catalog
        working-directory: worker
        run: cargo run --quiet --bin validate_catalog -- --app-sources-path apps.yaml

      - name: Resolve dispatch inputs
        id: inputs
        run: |
          version_override=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version_override="${{ inputs.version_override }}"
          fi
          echo "version_override=$version_override" >> "$GITHUB_OUTPUT"

      - name: Compute (app, environment) pairs to deploy
        id: pairs
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            push)
              # GitOps path: an app CI bumped a version: line in apps.yaml
              # and pushed to main. Diff the parent commit's apps.yaml
              # against the current one and only deploy what changed.
              # Re-runs and infra-only edits to deploy-apps.yml (which is
              # in the path filter) produce an empty diff and short-circuit
              # via has_changes=false.
              before="${{ github.event.before }}"
              if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
                echo "no parent commit, skipping diff"
                pairs='[]'
              else
                if ! git show "${before}:worker/apps.yaml" > /tmp/old-apps.yaml 2>/dev/null; then
                  # apps.yaml didn't exist in the parent commit (first push)
                  echo 'apps: []' > /tmp/old-apps.yaml
                fi
                pairs=$(cd worker && cargo run --quiet --bin diff_versions -- \
                  --old /tmp/old-apps.yaml --new apps.yaml)
              fi
              ;;
            workflow_dispatch)
              target="${{ inputs.target_app_id }}"
              env="${{ inputs.environment }}"
              if [ -n "$target" ]; then
                pairs=$(jq -nc --arg a "$target" --arg e "$env" '[{appId:$a, environment:$e}]')
              else
                pairs=$(yq -o json '.' worker/apps.yaml | jq -c \
                  --arg e "$env" '[ .apps[] | {appId: .id, environment: $e} ]')
              fi
              ;;
            repository_dispatch)
              # Legacy path. Removed from app repos in F4.4 once they switch
              # to the bump-and-push model; left here so in-flight dispatches
              # during the rollout window still deploy.
              published_app="${{ github.event.client_payload.app }}"
              app_id="${published_app##*/}"
              env="${{ github.event.client_payload.environment }}"
              pairs=$(jq -nc --arg a "$app_id" --arg e "$env" '[{appId:$a, environment:$e}]')
              ;;
            *)
              pairs='[]'
              ;;
          esac
          echo "pairs: $pairs"
          echo "value=$pairs" >> "$GITHUB_OUTPUT"

      - name: Enrich pairs and validate Terraform drift
        id: matrix
        run: |
          set -euo pipefail
          pairs='${{ steps.pairs.outputs.value }}'

          # Drift check: every Pages project name in apps.yaml must be
          # represented in terraform/variables.tf. Prod names are stored
          # as literal defaults; dev names are composed in main.tf as
          # "${var.<app>_pages_project_name}${var.dev_project_suffix}",
          # so for dev entries we verify the prod base name is present
          # and the trailing suffix matches dev_project_suffix.
          apps_json=$(yq -o json '.' worker/apps.yaml)
          dev_suffix=$(awk '/variable "dev_project_suffix"/{f=1} f && /default/{match($0,/"[^"]+"/); print substr($0,RSTART+1,RLENGTH-2); exit}' terraform/variables.tf)
          if [ -z "$dev_suffix" ]; then
            echo "Could not read dev_project_suffix default from terraform/variables.tf" >&2
            exit 1
          fi
          while IFS= read -r name; do
            if ! grep -q "\"${name}\"" terraform/variables.tf; then
              echo "Terraform variables drift: missing prod project name '${name}'" >&2
              exit 1
            fi
          done < <(echo "$apps_json" | jq -r '.apps[].env.prod.pages')
          while IFS= read -r name; do
            base="${name%${dev_suffix}}"
            if [ "$base" = "$name" ]; then
              echo "Terraform variables drift: dev project '${name}' does not end with suffix '${dev_suffix}'" >&2
              exit 1
            fi
            if ! grep -q "\"${base}\"" terraform/variables.tf; then
              echo "Terraform variables drift: missing prod base '${base}' for dev project '${name}'" >&2
              exit 1
            fi
          done < <(echo "$apps_json" | jq -r '.apps[].env.dev.pages')

          if [ "$pairs" = "[]" ] || [ -z "$pairs" ]; then
            echo "No (app, environment) pairs to deploy — nothing changed."
            echo "value=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix=$(yq -o json '.' worker/apps.yaml | jq -c \
            --argjson pairs "$pairs" '
              .apps as $apps
              | $pairs
              | map(
                  . as $pair
                  | ($apps[] | select(.id == $pair.appId)) as $app
                  | {
                      appId: $pair.appId,
                      environment: $pair.environment,
                      image: $app.image,
                      pagesProject: (if $pair.environment == "dev" then $app.env.dev.pages else $app.env.prod.pages end),
                      version: (if $pair.environment == "dev" then $app.env.dev.version else $app.env.prod.version end)
                    }
                )
            ')

          # If a pair references an app id not in apps.yaml, the jq map
          # silently drops it. Catch that here so a typo in a legacy
          # repository_dispatch payload fails loudly.
          expected=$(echo "$pairs" | jq 'length')
          actual=$(echo "$matrix" | jq 'length')
          if [ "$expected" != "$actual" ]; then
            echo "matrix expansion lost entries (pairs=$expected matrix=$actual)" >&2
            echo "pairs: $pairs" >&2
            echo "matrix: $matrix" >&2
            exit 1
          fi
          echo "matrix: $matrix"
          echo "value=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  deploy_apps:
    name: Deploy ${{ matrix.appId }} (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    concurrency:
      group: deploy-apps-${{ matrix.appId }}-${{ matrix.environment }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine artifact version
        id: version
        run: |
          version_override="${{ needs.prepare.outputs.version_override }}"
          echo "value=${version_override:-${{ matrix.version }}}" >> "$GITHUB_OUTPUT"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -euo pipefail
          username="${GHCR_USERNAME:-${{ github.repository_owner }}}"
          echo "${{ secrets.CROSS_REPO_TOKEN }}" | oras login ghcr.io -u "${username}" --password-stdin

      - name: Pull app artifact from GHCR
        run: |
          set -euo pipefail
          mkdir -p .artifact
          cd .artifact
          artifact_ref="${{ matrix.image }}:${{ steps.version.outputs.value }}"
          echo "Pulling ${artifact_ref}"
          oras pull "${artifact_ref}"
          artifact_file="$(find . -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${artifact_file}" ]; then
            echo "No .tar.gz artifact found in ${artifact_ref}" >&2
            exit 1
          fi
          echo "Using artifact archive: ${artifact_file}"
          mkdir -p app_build
          tar -xzf "${artifact_file}" -C app_build

      - name: Check if Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ matrix.pagesProject }}
        run: |
          status_code=$(curl -sS -o /tmp/cf-pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PROJECT_NAME}")
          if [ "$status_code" != "200" ]; then
            echo "Missing Terraform-managed Pages project: ${CLOUDFLARE_PROJECT_NAME}" >&2
            cat /tmp/cf-pages-project.json
            exit 1
          fi

      - name: Deploy app to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages deploy .artifact/app_build --project-name ${{ matrix.pagesProject }} --branch main --commit-dirty=true
