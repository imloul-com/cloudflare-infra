name: Deploy Router

on:
  workflow_run:
    workflows: ["Build Router Worker Artifact"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override router artifact tag (optional)"
        required: false
        default: ""
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Validate app catalog
        working-directory: worker
        run: cargo run --quiet --bin validate_catalog -- --app-sources-path apps.yaml

  deploy_router:
    name: Deploy router worker (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: prepare
    # Sequential dev → prod with fail-fast. dev deploys first; its
    # post-deploy smoke test must pass before prod is touched. If the
    # dev leg fails (build, deploy, or smoke), the queued prod leg is
    # cancelled and prod stays on the previous worker version.
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        environment: [dev, prod]
    concurrency:
      group: deploy-router-${{ matrix.environment }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: worker

      - name: Resolve environment config
        id: env
        run: |
          if [ "${{ matrix.environment }}" = "dev" ]; then
            echo "worker_name=domain-router-dev" >> "$GITHUB_OUTPUT"
            echo "zone_name=dev.imloul.com" >> "$GITHUB_OUTPUT"
            default_tag="dev-latest"
          else
            echo "worker_name=domain-router" >> "$GITHUB_OUTPUT"
            echo "zone_name=${{ vars.CLOUDFLARE_ZONE_NAME }}" >> "$GITHUB_OUTPUT"
            default_tag="prod-latest"
          fi
          version_override="${{ inputs.version_override }}"
          echo "router_artifact_tag=${version_override:-$default_tag}" >> "$GITHUB_OUTPUT"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -euo pipefail
          username="${GHCR_USERNAME:-${{ github.repository_owner }}}"
          echo "${{ secrets.CROSS_REPO_TOKEN }}" | oras login ghcr.io -u "${username}" --password-stdin

      - name: Pull prebuilt router worker from GHCR
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/domain-router-worker"
          artifact_ref="${image}:${{ steps.env.outputs.router_artifact_tag }}"
          mkdir -p .artifact
          cd .artifact
          echo "Pulling ${artifact_ref}"
          oras pull "${artifact_ref}"
          artifact_file="$(find . -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "${artifact_file}" ]; then
            echo "No worker artifact archive found in ${artifact_ref}" >&2
            exit 1
          fi
          echo "Using worker artifact archive: ${artifact_file}"
          tar -xzf "${artifact_file}" -C ..

      - name: Assemble route definitions from catalog
        run: |
          make assemble-routes ENVIRONMENT="${{ matrix.environment }}"
          jq . src/route-definitions.json

      - name: Resolve Pages origins
        id: origins
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          deploy_var_args="$(make resolve-origins ROUTE_DEFINITIONS_PATH=src/route-definitions.json)"
          {
            echo "deploy_var_args<<EOF"
            echo "$deploy_var_args"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Inject route definitions into deploy config
        run: |
          cp wrangler.deploy.toml wrangler.deploy.generated.toml
          route_defs=$(jq -c '.' src/route-definitions.json)
          printf "\n[vars]\nROUTE_DEFINITIONS = '%s'\n" "$route_defs" >> wrangler.deploy.generated.toml

      - name: Deploy router worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "4.80.0"
          command: deploy --config wrangler.deploy.generated.toml --name ${{ steps.env.outputs.worker_name }}${{ steps.origins.outputs.deploy_var_args }}

      - name: Post-deploy smoke test
        env:
          CLOUDFLARE_ZONE_NAME: ${{ steps.env.outputs.zone_name }}
        run: |
          sleep 3
          cargo run --quiet --bin uptime_monitor -- --app-sources-path apps.yaml --environment ${{ matrix.environment }}
